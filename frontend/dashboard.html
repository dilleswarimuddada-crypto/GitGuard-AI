<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitGuard AI Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="navbar">
    <h1>🛡 GitGuard AI</h1>
    <button class="status-btn">ACTIVE</button>
  </div>

  <div class="cards">

    <div class="card">
      <h2>Total PRs</h2>
      <p>12</p>
    </div>

    <div class="card danger">
      <h2>Issues Found</h2>
      <p>2</p>
    </div>

    <div class="card success">
      <h2>Security Score</h2>
      <p>92%</p>
    </div>

  </div>

  <div class="table-section">

    <h2>Live Analysis Feed</h2>

    <table>

      <tr>
        <th>Repository</th>
        <th>PR</th>
        <th>Status</th>
      </tr>

      <tr>
        <td>GitGuard-AI</td>
        <td>#12</td>
        <td class="clean">Clean</td>
      </tr>

      <tr>
        <td>CryptoScanner</td>
        <td>#7</td>
        <td class="warning">Warning</td>
      </tr>

    </table>

  </div>

</body>
  </html>
